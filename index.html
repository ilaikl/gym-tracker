<!doctype html><html class="no-js" lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title></title><link rel="stylesheet" href="css/style.css"><meta name="description" content=""><meta property="og:title" content=""><meta property="og:type" content=""><meta property="og:url" content=""><meta property="og:image" content=""><meta property="og:image:alt" content=""><link rel="icon" href="favicon.ico" sizes="any"><link rel="icon" href="icon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="icon.png"><link rel="manifest" href="site.webmanifest"><meta name="theme-color" content="#fafafa"><script defer="defer" src="/gym-tracker/js/app.js"></script></head><body><div id="app"><h1>Workout Tracker</h1><div id="backup-restore"><h2>Backup / Restore</h2><button id="export-btn">Export Data (JSON)</button> <input type="file" id="import-input" style="display: none;" accept=".json"> <button id="import-btn">Import Data (JSON)</button></div><div id="program-management" style="margin-top: 20px;"><h2>Program Management</h2><button id="view-program-btn">View/Edit Program</button><div id="program-editor" style="display: none;"><h3>Edit Program</h3><div id="program-days-list"></div><button id="add-day-btn">Add New Day</button><div id="exercise-editor" style="display: none; border: 1px solid #ccc; padding: 10px; margin-top: 10px;"><h4 id="ex-editor-title">Add/Edit Exercise</h4><input id="ex-name" placeholder="Exercise Name"><br><input id="ex-bodypart" placeholder="Primary Body Part"><br><button id="save-ex-btn">Save Exercise</button> <button id="cancel-ex-btn">Cancel</button></div></div></div><div id="workout-engine" style="margin-top: 20px;"><h2>Workout</h2><button id="start-workout-btn">Start Workout</button><div id="start-workout-screen" style="display: none;"><h3>Select Workout Day</h3><div id="days-to-select-list"></div><button id="cancel-start-btn">Cancel</button></div><div id="active-workout-screen" style="display: none;"><h3 id="active-day-name">Active Workout</h3><div id="active-exercises-list"></div><div id="add-exercise-actions" style="margin: 10px 0;"><button id="show-add-ex-modal-btn">Add Exercise</button></div><button id="complete-workout-btn">Complete Workout</button> <button id="cancel-active-workout-btn" style="color: red;">Exit</button></div><div id="add-ex-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;"><div style="background: white; margin: 50px auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 8px;"><h3>Add Exercise to Workout</h3><div id="exercise-source-toggle"><button id="toggle-existing-ex">Existing</button> <button id="toggle-manual-ex">Manual</button></div><div id="existing-ex-container" style="margin-top: 15px;"><label for="existing-ex-select">Select Exercise:</label><br><select id="existing-ex-select" style="width: 100%; margin-bottom: 10px;"></select> <button id="add-existing-ex-confirm">Add Selected</button></div><div id="manual-ex-container" style="display: none; margin-top: 15px;"><input id="manual-ex-name" placeholder="Exercise Name" style="width: 100%; margin-bottom: 5px;"><br><input id="manual-ex-bodypart" placeholder="Body Part" style="width: 100%; margin-bottom: 5px;"><br><label>Sets:</label> <input type="number" id="manual-ex-sets" value="3" style="width: 50px; margin-bottom: 5px;"><br><label>Target Reps:</label> <input type="number" id="manual-ex-reps" value="10" style="width: 50px; margin-bottom: 5px;"><br><label>Weight:</label> <input type="number" id="manual-ex-weight" value="0" style="width: 50px; margin-bottom: 5px;"><br><button id="add-manual-ex-confirm">Add Manual</button></div><div style="margin-top: 20px; text-align: right;"><button id="close-add-ex-modal">Cancel</button></div></div></div></div><div id="history-section" style="margin-top: 20px;"><h2>History & Progression</h2><button id="view-history-btn">View History</button><div id="history-screen" style="display: none;"><h3>Workout History</h3><div id="history-list"></div></div><div id="progression-screen" style="display: none;"><h3>Exercise Progress</h3><h4 id="progression-ex-name"></h4><div id="progression-list"></div><button id="back-to-history-btn">Back to History</button></div></div></div></body></html>
